<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EAS" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=101" />
  <meta name="application-name" content="EAS v1.0.1" />
  <title>EAS v1.0.1</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">eBay Assistant System</p>
        <h1 id="page-title">대시보드</h1>
      </div>
      <button class="icon-button" id="new-product-top" aria-label="새 상품">＋</button>
    </header>

    <main id="app" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="주 메뉴">
      <button data-route="dashboard" class="active"><span>⌂</span><small>홈</small></button>
      <button data-route="products"><span>▦</span><small>상품</small></button>
      <button data-route="calculator"><span>＄</span><small>계산</small></button>
      <button data-route="settings"><span>⚙</span><small>설정</small></button>
    </nav>
  </div>
  <input id="photo-input" type="file" accept="image/*" capture="environment" hidden />
  <input id="barcode-image-input" type="file" accept="image/*" capture="environment" hidden />
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js" defer></script>
  <script src="app.js?v=101" defer></script>
</body>
</html>
